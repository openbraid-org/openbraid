<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>openbraid</title>
    <style>
        :root {
            --bg: #0d0d10;
            --fg: #e8e8ec;
            --accent: #c8a96a;
            --muted: #888;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        main {
            max-width: 28rem;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            letter-spacing: -0.02em;
        }
        .tagline {
            color: var(--muted);
            margin: 0 0 2rem;
            font-size: 1.05rem;
            line-height: 1.5;
        }
        a.signin {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
            border-radius: 0.375rem;
            font-weight: 600;
            transition: opacity 0.15s;
        }
        a.signin:hover {
            opacity: 0.85;
        }
        footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: var(--muted);
        }
        footer a {
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main>
        <h1>openbraid</h1>
        <p class="tagline">
            Persistent memory and role-portable identity for stateless AI sessions.
        </p>
        <a href="/auth/login" class="signin">Sign in with Google</a>
        <footer>
            Part of the <a href="https://oagp.org" target="_blank">OAGP family</a>.
            <a href="https://github.com/openbraid-org/openbraid" target="_blank">Source</a>.
        </footer>
    </main>
</body>
</html>
