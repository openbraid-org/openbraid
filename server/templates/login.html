<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>openbraid</title>
    <style>
        :root {
            --bg: #0d0d10;
            --fg: #e8e8ec;
            --accent: #c8a96a;
            --muted: #888;
            --card: #16161a;
            --border: #2a2a30;
            --error: #e07b7b;
            --notice: #7bc3e0;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        main {
            width: 100%;
            max-width: 26rem;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            letter-spacing: -0.02em;
        }
        .tagline {
            color: var(--muted);
            margin: 0 0 2rem;
            font-size: 1.05rem;
            line-height: 1.5;
        }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            margin: 0 0 1rem;
            text-align: left;
            font-size: 0.9rem;
        }
        .alert-error {
            background: rgba(224, 123, 123, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }
        .alert-notice {
            background: rgba(123, 195, 224, 0.1);
            border: 1px solid var(--notice);
            color: var(--notice);
        }
        a.signin {
            display: block;
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
            border-radius: 0.375rem;
            font-weight: 600;
            transition: opacity 0.15s;
        }
        a.signin:hover {
            opacity: 0.85;
        }
        .divider {
            display: flex;
            align-items: center;
            color: var(--muted);
            font-size: 0.85rem;
            margin: 1.5rem 0;
            gap: 0.75rem;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            text-align: left;
        }
        input[type=email],
        input[type=password] {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            color: var(--fg);
            font-size: 0.95rem;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .button-row {
            display: flex;
            gap: 0.5rem;
        }
        button {
            flex: 1;
            padding: 0.7rem 1rem;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.15s, background 0.15s;
        }
        button[type=submit].primary {
            background: var(--accent);
            color: var(--bg);
            border: 1px solid var(--accent);
        }
        button[type=submit].secondary {
            background: transparent;
            color: var(--fg);
            border: 1px solid var(--border);
        }
        button:hover {
            opacity: 0.85;
        }
        button[type=submit].secondary:hover {
            border-color: var(--muted);
        }
        footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: var(--muted);
        }
        footer a {
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main>
        <h1>openbraid</h1>
        <p class="tagline">
            Persistent memory and role-portable identity for stateless AI sessions.
        </p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% if notice %}
        <div class="alert alert-notice">{{ notice }}</div>
        {% endif %}

        <a href="/auth/login" class="signin">Sign in with Google</a>

        <div class="divider">or</div>

        <form method="post" action="/auth/email/login">
            <input
                type="email"
                name="email"
                placeholder="Email"
                autocomplete="email"
                value="{{ email|default('') }}"
                required
            >
            <input
                type="password"
                name="password"
                placeholder="Password"
                autocomplete="current-password"
                required
            >
            <div class="button-row">
                <button type="submit" class="primary">Sign in</button>
                <button type="submit" class="secondary" formaction="/auth/email/signup">Sign up</button>
            </div>
        </form>

        <footer>
            Part of the <a href="https://oagp.org" target="_blank">OAGP family</a>.
            <a href="https://github.com/openbraid-org/openbraid" target="_blank">Source</a>.
        </footer>
    </main>
</body>
</html>
