<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>openbraid panel</title>
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg: #0d0d10;
            --fg: #e8e8ec;
            --accent: #c8a96a;
            --muted: #888;
            --card: #16161a;
            --border: #2a2a30;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.01em;
        }
        .user-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--muted);
        }
        .user-bar form { margin: 0; }
        .user-bar button {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 0.4rem 0.8rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .user-bar button:hover {
            color: var(--fg);
            border-color: var(--muted);
        }
        main {
            max-width: 48rem;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0 0 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>openbraid</h1>
        <div class="user-bar">
            <span>{{ user.email }}</span>
            <form method="post" action="/auth/logout">
                <button type="submit">Sign out</button>
            </form>
        </div>
    </header>
    <main>
        <h2>Pending PIN requests</h2>
        <section
            id="pins"
            hx-get="/panel/pins"
            hx-trigger="load, every 2s"
            hx-swap="innerHTML"
        >
            <p style="color: var(--muted)">Loading...</p>
        </section>
    </main>
</body>
</html>
